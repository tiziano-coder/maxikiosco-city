<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Maxikiosco City">
<meta name="theme-color" content="#1e293b">
<title>Maxikiosco City</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #f1f5f9; user-select: none; -webkit-user-select: none; }
  body { padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); display: flex; flex-direction: column; }

  /* Header */
  .header { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); padding: 16px 20px; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header .logo { display: flex; align-items: center; gap: 10px; }
  .header .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, #f59e0b, #ef4444); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }

  /* Main content area */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; padding: 16px; padding-bottom: 90px; }
  .content::-webkit-scrollbar { display: none; }

  /* Bottom navigation */
  .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 23, 42, 0.95); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-top: 1px solid #334155; display: flex; padding: 8px 0 calc(8px + env(safe-area-inset-bottom)) 0; z-index: 100; }
  .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; padding: 8px 4px; background: none; border: none; color: #64748b; font-size: 11px; font-weight: 500; cursor: pointer; transition: color 0.2s; }
  .nav-item.active { color: #f59e0b; }
  .nav-item svg { width: 24px; height: 24px; }

  /* Cards */
  .card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 16px; margin-bottom: 12px; }
  .card-title { font-size: 12px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }

  /* Dashboard stats */
  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }
  .stat-card { background: #1e293b; border: 1px solid #334155; border-radius: 14px; padding: 16px; }
  .stat-card.alert { background: linear-gradient(135deg, #7c2d12, #991b1b); border-color: #dc2626; }
  .stat-card.warn { background: linear-gradient(135deg, #78350f, #92400e); border-color: #f59e0b; }
  .stat-value { font-size: 32px; font-weight: 700; line-height: 1; margin-bottom: 4px; }
  .stat-label { font-size: 12px; color: #cbd5e1; font-weight: 500; }

  /* Buttons */
  .btn { background: linear-gradient(135deg, #f59e0b, #ef4444); color: white; border: none; padding: 14px 20px; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; transition: transform 0.1s; }
  .btn:active { transform: scale(0.97); }
  .btn-secondary { background: #334155; }
  .btn-danger { background: #dc2626; }
  .btn-small { padding: 8px 14px; font-size: 13px; width: auto; }
  .btn-icon { width: 44px; height: 44px; padding: 0; border-radius: 50%; }

  /* Lists */
  .product-item { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 14px; margin-bottom: 8px; display: flex; align-items: center; gap: 12px; cursor: pointer; transition: background 0.15s; }
  .product-item:active { background: #334155; }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .product-meta { font-size: 12px; color: #94a3b8; display: flex; gap: 10px; flex-wrap: wrap; }
  .product-badge { padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 600; }
  .badge-ok { background: #14532d; color: #4ade80; }
  .badge-warn { background: #78350f; color: #fbbf24; }
  .badge-danger { background: #7f1d1d; color: #f87171; }
  .badge-low { background: #1e3a8a; color: #60a5fa; }

  /* Forms */
  .form-group { margin-bottom: 14px; }
  .form-label { display: block; font-size: 13px; font-weight: 500; color: #cbd5e1; margin-bottom: 6px; }
  .form-input, .form-select { width: 100%; background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 12px 14px; color: #f1f5f9; font-size: 15px; font-family: inherit; }
  .form-input:focus, .form-select:focus { outline: none; border-color: #f59e0b; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  /* Search bar */
  .search-bar { position: sticky; top: 0; background: #0f172a; padding: 8px 0 12px; z-index: 10; }
  .search-input { width: 100%; background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 12px 14px 12px 40px; color: #f1f5f9; font-size: 15px; font-family: inherit; }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); margin-top: -2px; color: #64748b; }
  .search-wrapper { position: relative; }

  /* Modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: flex-end; justify-content: center; }
  .modal-overlay.active { display: flex; }
  .modal { background: #1e293b; border-radius: 20px 20px 0 0; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); animation: slideUp 0.25s ease; }
  @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-title { font-size: 20px; font-weight: 700; }
  .modal-close { background: #334155; border: none; color: #f1f5f9; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }

  /* Empty state */
  .empty { text-align: center; padding: 40px 20px; color: #64748b; }
  .empty-icon { font-size: 48px; margin-bottom: 12px; opacity: 0.5; }
  .empty-text { font-size: 14px; }

  /* Filter pills */
  .filter-pills { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 4px; }
  .filter-pills::-webkit-scrollbar { display: none; }
  .pill { padding: 6px 14px; background: #1e293b; border: 1px solid #334155; border-radius: 20px; color: #94a3b8; font-size: 13px; font-weight: 500; cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .pill.active { background: #f59e0b; border-color: #f59e0b; color: #0f172a; font-weight: 600; }

  /* FAB */
  .fab { position: fixed; bottom: calc(90px + env(safe-area-inset-bottom)); right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #f59e0b, #ef4444); border: none; color: white; font-size: 28px; box-shadow: 0 4px 16px rgba(239, 68, 68, 0.4); cursor: pointer; z-index: 50; display: flex; align-items: center; justify-content: center; }
  .fab:active { transform: scale(0.95); }

  /* Scanner */
  #scanner-container { width: 100%; max-width: 400px; margin: 0 auto; border-radius: 12px; overflow: hidden; }
  #scanner-container video { width: 100% !important; }

  /* Section title */
  .section-title { font-size: 13px; font-weight: 600; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; margin: 16px 0 10px; padding-left: 4px; }

  /* Toast */
  .toast { position: fixed; bottom: 110px; left: 50%; transform: translateX(-50%); background: #1e293b; border: 1px solid #334155; padding: 12px 20px; border-radius: 12px; font-size: 14px; z-index: 300; box-shadow: 0 8px 24px rgba(0,0,0,0.4); opacity: 0; transition: opacity 0.3s, bottom 0.3s; pointer-events: none; }
  .toast.show { opacity: 1; bottom: 120px; }
  .toast.success { border-color: #16a34a; }
  .toast.error { border-color: #dc2626; }

  /* Detail view rows */
  .detail-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #334155; }
  .detail-row:last-child { border-bottom: none; }
  .detail-label { color: #94a3b8; font-size: 14px; }
  .detail-value { font-weight: 600; font-size: 14px; }

  /* Lot list */
  .lot-item { background: #0f172a; border: 1px solid #334155; border-radius: 10px; padding: 10px 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
  .lot-info { font-size: 13px; }
  .lot-date { color: #94a3b8; font-size: 12px; margin-top: 2px; }

  /* Quick action grid */
  .quick-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .quick-action { background: #1e293b; border: 1px solid #334155; border-radius: 12px; padding: 16px 12px; text-align: center; cursor: pointer; transition: background 0.15s; }
  .quick-action:active { background: #334155; }
  .quick-action-icon { font-size: 28px; margin-bottom: 6px; }
  .quick-action-label { font-size: 12px; font-weight: 600; color: #cbd5e1; }

  /* Hidden */
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <div class="logo-icon">🏪</div>
    <h1>Maxikiosco City</h1>
  </div>
  <button class="btn-icon btn-secondary" id="btnScanHeader" style="background:#334155; border:none; color:#f1f5f9; display:flex; align-items:center; justify-content:center;">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/><path d="M7 8v8M11 8v8M15 8v8"/></svg>
  </button>
</div>

<div class="content" id="content"></div>

<button class="fab hidden" id="fab">+</button>

<div class="bottom-nav">
  <button class="nav-item active" data-view="dashboard">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 12l9-9 9 9M5 10v10a1 1 0 001 1h12a1 1 0 001-1V10"/></svg>
    Inicio
  </button>
  <button class="nav-item" data-view="stock">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"/></svg>
    Stock
  </button>
  <button class="nav-item" data-view="vencimientos">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
    Vencer
  </button>
  <button class="nav-item" data-view="calendario">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
    Agenda
  </button>
  <button class="nav-item" data-view="mas">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    Más
  </button>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal" id="modalContent"></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ STATE ============
const STORAGE_KEY = 'maxikiosco_city_data_v1';

let state = {
  products: [],
  events: [],
  providers: [],
  settings: {
    warnDaysBefore: 30,
    dangerDaysBefore: 7,
    lowStockDefault: 5
  }
};

let currentView = 'dashboard';
let scanner = null;
let scannerCallback = null;

// ============ STORAGE ============
function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) {
      const parsed = JSON.parse(saved);
      state = { ...state, ...parsed };
    } else {
      // Seed example data
      seedData();
    }
  } catch(e) {
    console.error('Error loading state', e);
    seedData();
  }
}

function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  } catch(e) {
    console.error('Error saving', e);
    showToast('Error guardando datos', 'error');
  }
}

function seedData() {
  const today = new Date();
  const addDays = (d) => { const x = new Date(today); x.setDate(x.getDate()+d); return x.toISOString().split('T')[0]; };
  state.products = [
    { id: '1', barcode: '7790070410016', name: 'Coca Cola 2.25L', category: 'Bebidas', price: 2800, lowStockThreshold: 6, lots: [{id:'l1', quantity: 12, expiry: addDays(45)}] },
    { id: '2', barcode: '7790580128012', name: 'Marlboro Box 20', category: 'Cigarrillos', price: 4500, lowStockThreshold: 10, lots: [{id:'l2', quantity: 25, expiry: addDays(180)}] },
    { id: '3', barcode: '7790040120015', name: 'Pan Lactal Bimbo', category: 'Almacén', price: 2400, lowStockThreshold: 4, lots: [{id:'l3', quantity: 3, expiry: addDays(5)}] },
    { id: '4', barcode: '7790895000119', name: 'Mantecol Original', category: 'Golosinas', price: 1200, lowStockThreshold: 8, lots: [{id:'l4', quantity: 15, expiry: addDays(20)}, {id:'l5', quantity: 8, expiry: addDays(90)}] },
    { id: '5', barcode: '7791675000019', name: 'Yerba Playadito 1kg', category: 'Almacén', price: 3500, lowStockThreshold: 5, lots: [{id:'l6', quantity: 2, expiry: addDays(220)}] },
  ];
  state.events = [
    { id: 'e1', title: 'Pedido distribuidor Coca', date: addDays(2), time: '09:00', notes: 'Llamar antes de las 10am', recurring: 'weekly' },
    { id: 'e2', title: 'Pago alquiler local', date: addDays(8), time: '12:00', notes: '', recurring: 'monthly' },
  ];
  state.providers = [
    { id: 'p1', name: 'Distribuidora Coca Cola', phone: '2317456789', notes: 'Pedido los lunes' },
    { id: 'p2', name: 'Massalin Particulares', phone: '2317112233', notes: 'Cigarrillos - martes' },
  ];
  saveState();
}

// ============ UTILS ============
function uid() { return Date.now().toString(36) + Math.random().toString(36).substr(2, 5); }

function daysUntil(dateStr) {
  if (!dateStr) return Infinity;
  const today = new Date(); today.setHours(0,0,0,0);
  const target = new Date(dateStr); target.setHours(0,0,0,0);
  return Math.round((target - today) / 86400000);
}

function getExpiryStatus(days) {
  if (days < 0) return 'danger';
  if (days <= state.settings.dangerDaysBefore) return 'danger';
  if (days <= state.settings.warnDaysBefore) return 'warn';
  return 'ok';
}

function getTotalStock(product) {
  return (product.lots || []).reduce((s,l) => s + (l.quantity||0), 0);
}

function getNearestExpiry(product) {
  const lots = (product.lots || []).filter(l => l.expiry && l.quantity > 0);
  if (!lots.length) return null;
  return lots.reduce((a,b) => new Date(a.expiry) < new Date(b.expiry) ? a : b);
}

function formatDate(d) {
  if (!d) return '-';
  const date = new Date(d);
  return date.toLocaleDateString('es-AR', { day:'2-digit', month:'2-digit', year:'numeric' });
}

function formatDateShort(d) {
  if (!d) return '-';
  const date = new Date(d);
  return date.toLocaleDateString('es-AR', { day:'2-digit', month:'short' });
}

function formatPrice(n) {
  if (!n) return '$0';
  return '$' + Number(n).toLocaleString('es-AR');
}

function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast', 2200);
}

// ============ MODAL ============
function openModal(html) {
  document.getElementById('modalContent').innerHTML = html;
  document.getElementById('modal').classList.add('active');
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
  if (scanner) {
    try { scanner.stop().then(() => { scanner.clear(); scanner = null; }); } catch(e){ scanner = null; }
  }
}

document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target.id === 'modal') closeModal();
});

// ============ VIEWS ============
function render() {
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.view === currentView));
  const content = document.getElementById('content');
  const fab = document.getElementById('fab');

  switch(currentView) {
    case 'dashboard': content.innerHTML = renderDashboard(); fab.classList.add('hidden'); break;
    case 'stock': content.innerHTML = renderStock(); fab.classList.remove('hidden'); fab.onclick = () => openProductForm(); break;
    case 'vencimientos': content.innerHTML = renderVencimientos(); fab.classList.add('hidden'); break;
    case 'calendario': content.innerHTML = renderCalendario(); fab.classList.remove('hidden'); fab.onclick = () => openEventForm(); break;
    case 'mas': content.innerHTML = renderMas(); fab.classList.add('hidden'); break;
  }
  attachListeners();
}

function renderDashboard() {
  const today = new Date(); today.setHours(0,0,0,0);
  const expiringSoon = [];
  const expired = [];
  const lowStock = [];

  state.products.forEach(p => {
    const total = getTotalStock(p);
    if (total <= (p.lowStockThreshold || state.settings.lowStockDefault)) lowStock.push(p);
    (p.lots || []).forEach(l => {
      if (!l.expiry || l.quantity <= 0) return;
      const d = daysUntil(l.expiry);
      if (d < 0) expired.push({product: p, lot: l, days: d});
      else if (d <= state.settings.warnDaysBefore) expiringSoon.push({product: p, lot: l, days: d});
    });
  });

  expiringSoon.sort((a,b) => a.days - b.days);

  const upcomingEvents = state.events
    .filter(e => daysUntil(e.date) >= 0 && daysUntil(e.date) <= 7)
    .sort((a,b) => daysUntil(a.date) - daysUntil(b.date));

  return `
    <div class="stat-grid">
      <div class="stat-card alert">
        <div class="stat-value">${expired.length}</div>
        <div class="stat-label">Vencidos</div>
      </div>
      <div class="stat-card warn">
        <div class="stat-value">${expiringSoon.length}</div>
        <div class="stat-label">Por vencer</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${lowStock.length}</div>
        <div class="stat-label">Stock bajo</div>
      </div>
      <div class="stat-card">
        <div class="stat-value">${state.products.length}</div>
        <div class="stat-label">Productos</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Acciones rápidas</div>
      <div class="quick-grid">
        <div class="quick-action" data-action="scan-in">
          <div class="quick-action-icon">📥</div>
          <div class="quick-action-label">Ingreso por escaneo</div>
        </div>
        <div class="quick-action" data-action="scan-out">
          <div class="quick-action-icon">📤</div>
          <div class="quick-action-label">Egreso por escaneo</div>
        </div>
        <div class="quick-action" data-action="lista-pedido">
          <div class="quick-action-icon">📋</div>
          <div class="quick-action-label">Lista de pedido</div>
        </div>
        <div class="quick-action" data-action="proveedores">
          <div class="quick-action-icon">🚚</div>
          <div class="quick-action-label">Proveedores</div>
        </div>
      </div>
    </div>

    ${expired.length ? `
    <div class="section-title" style="color:#f87171;">⚠️ Productos vencidos</div>
    ${expired.slice(0,5).map(e => productLotRow(e)).join('')}
    ` : ''}

    ${expiringSoon.length ? `
    <div class="section-title" style="color:#fbbf24;">⏰ Por vencer pronto</div>
    ${expiringSoon.slice(0,5).map(e => productLotRow(e)).join('')}
    ` : ''}

    ${lowStock.length ? `
    <div class="section-title" style="color:#60a5fa;">📉 Stock bajo</div>
    ${lowStock.slice(0,5).map(p => productRow(p)).join('')}
    ` : ''}

    ${upcomingEvents.length ? `
    <div class="section-title">📅 Esta semana</div>
    ${upcomingEvents.map(e => eventRow(e)).join('')}
    ` : ''}

    ${(!expired.length && !expiringSoon.length && !lowStock.length) ? `
    <div class="card" style="background:linear-gradient(135deg,#14532d,#166534); border-color:#16a34a;">
      <div style="font-size:18px; font-weight:700; margin-bottom:4px;">✅ Todo en orden</div>
      <div style="font-size:13px; color:#bbf7d0;">No hay productos vencidos, por vencer ni stock crítico.</div>
    </div>
    ` : ''}
  `;
}

function productLotRow(item) {
  const status = getExpiryStatus(item.days);
  const txt = item.days < 0 ? `Vencido hace ${Math.abs(item.days)}d` : `${item.days}d`;
  return `
    <div class="product-item" data-product-id="${item.product.id}">
      <div class="product-info">
        <div class="product-name">${item.product.name}</div>
        <div class="product-meta">
          <span>📦 ${item.lot.quantity} u.</span>
          <span>📅 ${formatDate(item.lot.expiry)}</span>
        </div>
      </div>
      <div class="product-badge badge-${status}">${txt}</div>
    </div>`;
}

function productRow(p) {
  const total = getTotalStock(p);
  const nearest = getNearestExpiry(p);
  const lowStock = total <= (p.lowStockThreshold || state.settings.lowStockDefault);
  let badge = '';
  if (nearest) {
    const d = daysUntil(nearest.expiry);
    const status = getExpiryStatus(d);
    badge = `<div class="product-badge badge-${status}">${d < 0 ? 'Vencido' : d + 'd'}</div>`;
  } else if (lowStock) {
    badge = `<div class="product-badge badge-low">Bajo</div>`;
  }
  return `
    <div class="product-item" data-product-id="${p.id}">
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-meta">
          <span>📦 ${total} u.</span>
          <span>${p.category||'-'}</span>
          ${p.price ? `<span>${formatPrice(p.price)}</span>` : ''}
        </div>
      </div>
      ${badge}
    </div>`;
}

function eventRow(e) {
  const d = daysUntil(e.date);
  const txt = d === 0 ? 'Hoy' : d === 1 ? 'Mañana' : `En ${d}d`;
  return `
    <div class="product-item" data-event-id="${e.id}">
      <div class="product-info">
        <div class="product-name">${e.title}</div>
        <div class="product-meta">
          <span>${formatDate(e.date)} ${e.time||''}</span>
          ${e.recurring && e.recurring !== 'none' ? `<span>🔁 ${e.recurring==='weekly'?'Semanal':e.recurring==='monthly'?'Mensual':'Diario'}</span>` : ''}
        </div>
      </div>
      <div class="product-badge badge-low">${txt}</div>
    </div>`;
}

let stockFilter = 'todos';
let stockSearch = '';

function renderStock() {
  const categories = ['todos', ...new Set(state.products.map(p => p.category).filter(Boolean))];
  let filtered = state.products;
  if (stockFilter !== 'todos') filtered = filtered.filter(p => p.category === stockFilter);
  if (stockSearch) {
    const q = stockSearch.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || (p.barcode||'').includes(q));
  }
  filtered.sort((a,b) => a.name.localeCompare(b.name));

  return `
    <div class="search-bar">
      <div class="search-wrapper">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="stockSearch" placeholder="Buscar producto o código..." value="${stockSearch}">
      </div>
    </div>
    <div class="filter-pills">
      ${categories.map(c => `<div class="pill ${c===stockFilter?'active':''}" data-filter="${c}">${c==='todos'?'Todos':c}</div>`).join('')}
    </div>
    ${filtered.length ? filtered.map(p => productRow(p)).join('') : `
      <div class="empty">
        <div class="empty-icon">📦</div>
        <div class="empty-text">${stockSearch||stockFilter!=='todos' ? 'No se encontraron productos' : 'Agregá tu primer producto con el botón +'}</div>
      </div>
    `}
  `;
}

let vencFilter = 'todos';

function renderVencimientos() {
  const items = [];
  state.products.forEach(p => {
    (p.lots || []).forEach(l => {
      if (!l.expiry || l.quantity <= 0) return;
      const days = daysUntil(l.expiry);
      items.push({product: p, lot: l, days});
    });
  });
  items.sort((a,b) => a.days - b.days);

  let filtered = items;
  if (vencFilter === 'vencidos') filtered = items.filter(i => i.days < 0);
  else if (vencFilter === 'criticos') filtered = items.filter(i => i.days >= 0 && i.days <= state.settings.dangerDaysBefore);
  else if (vencFilter === 'proximos') filtered = items.filter(i => i.days > state.settings.dangerDaysBefore && i.days <= state.settings.warnDaysBefore);

  return `
    <div class="filter-pills">
      <div class="pill ${vencFilter==='todos'?'active':''}" data-vfilter="todos">Todos (${items.length})</div>
      <div class="pill ${vencFilter==='vencidos'?'active':''}" data-vfilter="vencidos">Vencidos (${items.filter(i=>i.days<0).length})</div>
      <div class="pill ${vencFilter==='criticos'?'active':''}" data-vfilter="criticos">Críticos (${items.filter(i=>i.days>=0&&i.days<=state.settings.dangerDaysBefore).length})</div>
      <div class="pill ${vencFilter==='proximos'?'active':''}" data-vfilter="proximos">Próximos (${items.filter(i=>i.days>state.settings.dangerDaysBefore&&i.days<=state.settings.warnDaysBefore).length})</div>
    </div>
    ${filtered.length ? filtered.map(i => productLotRow(i)).join('') : `
      <div class="empty">
        <div class="empty-icon">✅</div>
        <div class="empty-text">No hay productos en esta categoría</div>
      </div>
    `}
  `;
}

function renderCalendario() {
  const sorted = [...state.events].sort((a,b) => new Date(a.date) - new Date(b.date));
  const future = sorted.filter(e => daysUntil(e.date) >= 0);
  const past = sorted.filter(e => daysUntil(e.date) < 0).reverse();

  return `
    <div class="card">
      <div class="card-title">Próximos eventos</div>
      ${future.length ? future.map(e => eventRow(e)).join('') : '<div class="empty"><div class="empty-text">Sin eventos próximos. Tocá + para agregar.</div></div>'}
    </div>
    ${past.length ? `
    <div class="card">
      <div class="card-title">Pasados</div>
      ${past.slice(0,5).map(e => eventRow(e)).join('')}
    </div>
    ` : ''}
  `;
}

// ============ LISTENERS ============
function attachListeners() {
  // Product rows
  document.querySelectorAll('[data-product-id]').forEach(el => {
    el.onclick = () => openProductDetail(el.dataset.productId);
  });
  // Event rows
  document.querySelectorAll('[data-event-id]').forEach(el => {
    el.onclick = () => openEventDetail(el.dataset.eventId);
  });
  // Filter pills - stock
  document.querySelectorAll('[data-filter]').forEach(el => {
    el.onclick = () => { stockFilter = el.dataset.filter; render(); };
  });
  // Filter pills - vencimientos
  document.querySelectorAll('[data-vfilter]').forEach(el => {
    el.onclick = () => { vencFilter = el.dataset.vfilter; render(); };
  });
  // Search input
  const si = document.getElementById('stockSearch');
  if (si) {
    si.oninput = (e) => { stockSearch = e.target.value; const f = document.querySelector('.filter-pills'); const list = document.querySelectorAll('.product-item'); /* re-render only list to keep focus */ rerenderStockList(); };
  }
  // Quick actions
  document.querySelectorAll('[data-action]').forEach(el => {
    el.onclick = () => handleQuickAction(el.dataset.action);
  });
}

function rerenderStockList() {
  const content = document.getElementById('content');
  let filtered = state.products;
  if (stockFilter !== 'todos') filtered = filtered.filter(p => p.category === stockFilter);
  if (stockSearch) {
    const q = stockSearch.toLowerCase();
    filtered = filtered.filter(p => p.name.toLowerCase().includes(q) || (p.barcode||'').includes(q));
  }
  filtered.sort((a,b) => a.name.localeCompare(b.name));
  // Remove existing product items and empty states, then re-insert
  const existingItems = content.querySelectorAll('.product-item, .empty');
  existingItems.forEach(e => e.remove());
  const html = filtered.length ? filtered.map(p => productRow(p)).join('') : `
    <div class="empty">
      <div class="empty-icon">📦</div>
      <div class="empty-text">No se encontraron productos</div>
    </div>
  `;
  content.insertAdjacentHTML('beforeend', html);
  document.querySelectorAll('[data-product-id]').forEach(el => {
    el.onclick = () => openProductDetail(el.dataset.productId);
  });
}

// ============ QUICK ACTIONS ============
function handleQuickAction(action) {
  switch(action) {
    case 'scan-in': openScanner((code) => handleScanResult(code, 'in')); break;
    case 'scan-out': openScanner((code) => handleScanResult(code, 'out')); break;
    case 'lista-pedido': openListaPedido(); break;
    case 'proveedores': openProveedores(); break;
    case 'settings': openSettings(); break;
    case 'backup': openBackup(); break;
  }
}

// ============ SCANNER ============
function openScanner(callback) {
  scannerCallback = callback;
  openModal(`
    <div class="modal-header">
      <div class="modal-title">📷 Escanear código</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div id="scanner-container"></div>
    <div style="text-align:center; color:#94a3b8; font-size:13px; margin-top:12px;">Apuntá la cámara al código de barras</div>
    <button class="btn btn-secondary" style="margin-top:14px;" onclick="manualEntry()">⌨️ Ingresar código manualmente</button>
  `);

  setTimeout(() => {
    try {
      scanner = new Html5Qrcode("scanner-container");
      const config = { fps: 10, qrbox: { width: 280, height: 140 }, aspectRatio: 1.5 };
      scanner.start(
        { facingMode: "environment" },
        config,
        (decodedText) => {
          if (scannerCallback) {
            const cb = scannerCallback;
            scannerCallback = null;
            scanner.stop().then(() => { scanner.clear(); scanner = null; cb(decodedText); });
          }
        },
        () => {}
      ).catch(err => {
        document.getElementById('scanner-container').innerHTML = `
          <div style="padding:20px; text-align:center; color:#f87171;">
            ⚠️ No se pudo acceder a la cámara.<br><br>
            <span style="color:#cbd5e1; font-size:13px;">Verificá que diste permiso de cámara en Safari. Ajustes > Safari > Cámara > Permitir.</span>
          </div>
        `;
      });
    } catch(e) {
      console.error(e);
    }
  }, 200);
}

function manualEntry() {
  const code = prompt('Ingresá el código de barras:');
  if (code && scannerCallback) {
    const cb = scannerCallback;
    scannerCallback = null;
    if (scanner) {
      try { scanner.stop().then(() => { scanner.clear(); scanner = null; cb(code); }); } catch(e){ scanner = null; cb(code); }
    } else {
      cb(code);
    }
  }
}

function handleScanResult(code, direction) {
  closeModal();
  const product = state.products.find(p => p.barcode === code);
  if (!product) {
    if (direction === 'out') {
      showToast('Producto no encontrado', 'error');
      return;
    }
    // New product flow
    if (confirm(`Código ${code} no registrado. ¿Querés crear el producto?`)) {
      openProductForm(null, code);
    }
    return;
  }
  if (direction === 'in') {
    openLotForm(product);
  } else {
    openEgreso(product);
  }
}

// Header scan button
document.getElementById('btnScanHeader').onclick = () => {
  openScanner((code) => {
    closeModal();
    const product = state.products.find(p => p.barcode === code);
    if (product) {
      openProductDetail(product.id);
    } else {
      if (confirm(`Código ${code} no registrado. ¿Crear nuevo producto?`)) {
        openProductForm(null, code);
      }
    }
  });
};

    <div class="form-group" style="background:#0f172a; padding:12px; border-radius:10px; border:1px solid #334155;">

function scanBarcodeForForm() {
  const modalContent = document.getElementById('modalContent').innerHTML;
  openScanner((code) => {
    closeModal();
    document.getElementById('modalContent').innerHTML = modalContent;
    document.getElementById('f_barcode').value = code;
  });
}

function saveProduct(id) {
  const name = document.getElementById('f_name').value.trim();
  if (!name) { showToast('Falta el nombre', 'error'); return; }
  const barcode = document.getElementById('f_barcode').value.trim();
  const category = document.getElementById('f_category').value.trim();
  const price = parseFloat(document.getElementById('f_price').value) || 0;
  const threshold = parseInt(document.getElementById('f_threshold').value) || state.settings.lowStockDefault;

  if (id) {
    const p = state.products.find(x => x.id === id);
    p.name = name; p.barcode = barcode; p.category = category; p.price = price; p.lowStockThreshold = threshold;
  } else {
    const newP = { id: uid(), name, barcode, category, price, lowStockThreshold: threshold, lots: [] };
    const initQty = parseInt(document.getElementById('f_initQty')?.value);
    const initExp = document.getElementById('f_initExpiry')?.value;
    if (initQty > 0) {
      newP.lots.push({ id: uid(), quantity: initQty, expiry: initExp || null });
    }
    state.products.push(newP);
  }
  saveState();
  closeModal();
  showToast(id ? 'Producto actualizado' : 'Producto creado');
  render();
}

function deleteProduct(id) {
  if (!confirm('¿Eliminar este producto y todo su stock?')) return;
  state.products = state.products.filter(p => p.id !== id);
  saveState();
  closeModal();
  showToast('Producto eliminado');
  render();
}

// ============ PRODUCT DETAIL ============
function openProductDetail(id) {
  const p = state.products.find(x => x.id === id);
  if (!p) return;
  const total = getTotalStock(p);
  const lots = (p.lots || []).slice().sort((a,b) => new Date(a.expiry||'9999') - new Date(b.expiry||'9999'));
  const lowStock = total <= (p.lowStockThreshold || state.settings.lowStockDefault);

  openModal(`
    <div class="modal-header">
      <div class="modal-title" style="font-size:18px;">${p.name}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="card" style="margin:0 0 14px 0;">
      <div class="detail-row"><span class="detail-label">Stock total</span><span class="detail-value" style="color:${lowStock?'#f87171':'#4ade80'}">${total} unidades ${lowStock?'⚠️':''}</span></div>
      <div class="detail-row"><span class="detail-label">Categoría</span><span class="detail-value">${p.category||'-'}</span></div>
      <div class="detail-row"><span class="detail-label">Precio</span><span class="detail-value">${formatPrice(p.price)}</span></div>
      <div class="detail-row"><span class="detail-label">Código</span><span class="detail-value" style="font-family:monospace; font-size:12px;">${p.barcode||'-'}</span></div>
      <div class="detail-row"><span class="detail-label">Umbral stock bajo</span><span class="detail-value">${p.lowStockThreshold || state.settings.lowStockDefault} u.</span></div>
    </div>

    <div style="display:flex; gap:8px; margin-bottom:14px;">
      <button class="btn" style="flex:1;" onclick="openLotForm(state.products.find(p=>p.id==='${id}'))">➕ Ingreso</button>
      <button class="btn btn-secondary" style="flex:1;" onclick="openEgreso(state.products.find(p=>p.id==='${id}'))">➖ Egreso</button>
    </div>

    <div class="card-title" style="margin-top:6px;">Lotes (${lots.length})</div>
    ${lots.length ? lots.map(l => {
      const d = l.expiry ? daysUntil(l.expiry) : null;
      const status = d !== null ? getExpiryStatus(d) : 'ok';
      return `
        <div class="lot-item">
          <div>
            <div class="lot-info">${l.quantity} unidades</div>
            <div class="lot-date">${l.expiry ? `Vence ${formatDate(l.expiry)} (${d<0?'vencido hace '+Math.abs(d)+'d':d+'d'})` : 'Sin fecha de vencimiento'}</div>
          </div>
          <div style="display:flex; gap:6px; align-items:center;">
            ${l.expiry ? `<div class="product-badge badge-${status}">${d<0?'⚠️':d<=7?'!':''}</div>` : ''}
            <button class="btn btn-secondary btn-small" onclick="deleteLot('${id}','${l.id}')">🗑️</button>
          </div>
        </div>
      `;
    }).join('') : '<div class="empty" style="padding:20px;"><div class="empty-text">Sin lotes registrados</div></div>'}

    <button class="btn btn-secondary" style="margin-top:14px;" onclick="openProductForm('${id}')">✏️ Editar producto</button>
  `);
}

function openLotForm(product) {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">📥 Ingreso de stock</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="margin-bottom:14px; color:#cbd5e1;">${product.name}</div>
    <div class="form-group">
      <label class="form-label">Cantidad *</label>
      <input type="number" class="form-input" id="lot_qty" autofocus min="1" placeholder="0">
    </div>
    <div class="form-group">
      <label class="form-label">Fecha de vencimiento</label>
      <input type="date" class="form-input" id="lot_exp">
    </div>
    <button class="btn" onclick="saveLot('${product.id}')">Agregar lote</button>
  `);
}

function saveLot(productId) {
  const qty = parseInt(document.getElementById('lot_qty').value);
  const exp = document.getElementById('lot_exp').value;
  if (!qty || qty < 1) { showToast('Cantidad inválida', 'error'); return; }
  const p = state.products.find(x => x.id === productId);
  p.lots = p.lots || [];
  p.lots.push({ id: uid(), quantity: qty, expiry: exp || null });
  saveState();
  closeModal();
  showToast(`+${qty} ${p.name}`);
  render();
}

function deleteLot(productId, lotId) {
  if (!confirm('¿Eliminar este lote?')) return;
  const p = state.products.find(x => x.id === productId);
  p.lots = p.lots.filter(l => l.id !== lotId);
  saveState();
  openProductDetail(productId);
  showToast('Lote eliminado');
}

function openEgreso(product) {
  const lots = (product.lots || []).filter(l => l.quantity > 0).sort((a,b) => new Date(a.expiry||'9999') - new Date(b.expiry||'9999'));
  if (!lots.length) { showToast('Sin stock disponible', 'error'); return; }
  openModal(`
    <div class="modal-header">
      <div class="modal-title">📤 Egreso de stock</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="margin-bottom:14px; color:#cbd5e1;">${product.name} · Total: ${getTotalStock(product)} u.</div>
    <div class="form-group">
      <label class="form-label">Lote a descontar (FIFO sugerido)</label>
      <select class="form-select" id="egr_lot">
        ${lots.map(l => `<option value="${l.id}">${l.quantity} u. - vence ${l.expiry?formatDate(l.expiry):'sin fecha'}</option>`).join('')}
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Cantidad a descontar *</label>
      <input type="number" class="form-input" id="egr_qty" autofocus min="1" value="1">
    </div>
    <button class="btn" onclick="saveEgreso('${product.id}')">Descontar stock</button>
  `);
}

function saveEgreso(productId) {
  const lotId = document.getElementById('egr_lot').value;
  const qty = parseInt(document.getElementById('egr_qty').value);
  if (!qty || qty < 1) { showToast('Cantidad inválida', 'error'); return; }
  const p = state.products.find(x => x.id === productId);
  const lot = p.lots.find(l => l.id === lotId);
  if (qty > lot.quantity) { showToast(`Solo hay ${lot.quantity} en este lote`, 'error'); return; }
  lot.quantity -= qty;
  if (lot.quantity === 0) p.lots = p.lots.filter(l => l.id !== lotId);
  saveState();
  closeModal();
  showToast(`-${qty} ${p.name}`);
  render();
}

// ============ EVENTS ============
function openEventForm(eventId) {
  const e = eventId ? state.events.find(x => x.id === eventId) : null;
  const isNew = !e;
  openModal(`
    <div class="modal-header">
      <div class="modal-title">${isNew ? '➕ Nuevo recordatorio' : '✏️ Editar recordatorio'}</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Título *</label>
      <input type="text" class="form-input" id="ev_title" value="${e?.title || ''}" placeholder="Ej: Pedido a distribuidor">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Fecha *</label>
        <input type="date" class="form-input" id="ev_date" value="${e?.date || new Date().toISOString().split('T')[0]}">
      </div>
      <div class="form-group">
        <label class="form-label">Hora</label>
        <input type="time" class="form-input" id="ev_time" value="${e?.time || ''}">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Repetir</label>
      <select class="form-select" id="ev_recurring">
        <option value="none" ${e?.recurring==='none'||!e?.recurring?'selected':''}>No repetir</option>
        <option value="daily" ${e?.recurring==='daily'?'selected':''}>Diario</option>
        <option value="weekly" ${e?.recurring==='weekly'?'selected':''}>Semanal</option>
        <option value="monthly" ${e?.recurring==='monthly'?'selected':''}>Mensual</option>
      </select>
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <textarea class="form-input" id="ev_notes" rows="3" placeholder="Notas...">${e?.notes || ''}</textarea>
    </div>
    <button class="btn" onclick="saveEvent('${eventId||''}')">${isNew ? 'Crear' : 'Guardar'}</button>
    ${!isNew ? `<button class="btn btn-danger" style="margin-top:10px;" onclick="deleteEvent('${eventId}')">🗑️ Eliminar</button>` : ''}
  `);
}

function saveEvent(id) {
  const title = document.getElementById('ev_title').value.trim();
  if (!title) { showToast('Falta el título', 'error'); return; }
  const data = {
    title,
    date: document.getElementById('ev_date').value,
    time: document.getElementById('ev_time').value,
    recurring: document.getElementById('ev_recurring').value,
    notes: document.getElementById('ev_notes').value.trim()
  };
  if (id) {
    Object.assign(state.events.find(e => e.id === id), data);
  } else {
    state.events.push({ id: uid(), ...data });
  }
  saveState();
  closeModal();
  showToast(id ? 'Recordatorio actualizado' : 'Recordatorio creado');
  // Schedule notification
  scheduleNotification(data);
  render();
}

function openEventDetail(id) {
  openEventForm(id);
}

function deleteEvent(id) {
  if (!confirm('¿Eliminar este recordatorio?')) return;
  state.events = state.events.filter(e => e.id !== id);
  saveState();
  closeModal();
  showToast('Eliminado');
  render();
}

// ============ PROVEEDORES ============
function openProveedores() {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">🚚 Proveedores</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <button class="btn" style="margin-bottom:14px;" onclick="openProviderForm()">➕ Nuevo proveedor</button>
    ${state.providers.length ? state.providers.map(p => `
      <div class="product-item" onclick="openProviderForm('${p.id}')">
        <div class="product-info">
          <div class="product-name">${p.name}</div>
          <div class="product-meta">
            ${p.phone ? `<span>📞 ${p.phone}</span>` : ''}
            ${p.notes ? `<span>${p.notes}</span>` : ''}
          </div>
        </div>
        ${p.phone ? `<a href="https://wa.me/54${p.phone.replace(/\\D/g,'')}" target="_blank" onclick="event.stopPropagation()" class="btn btn-small" style="background:#16a34a; text-decoration:none;">WhatsApp</a>` : ''}
      </div>
    `).join('') : '<div class="empty"><div class="empty-icon">🚚</div><div class="empty-text">Sin proveedores cargados</div></div>'}
  `);
}

function openProviderForm(id) {
  const p = id ? state.providers.find(x => x.id === id) : null;
  const isNew = !p;
  openModal(`
    <div class="modal-header">
      <div class="modal-title">${isNew ? '➕ Nuevo proveedor' : '✏️ Editar proveedor'}</div>
      <button class="modal-close" onclick="openProveedores()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Nombre *</label>
      <input type="text" class="form-input" id="pr_name" value="${p?.name || ''}">
    </div>
    <div class="form-group">
      <label class="form-label">Teléfono</label>
      <input type="tel" class="form-input" id="pr_phone" value="${p?.phone || ''}" placeholder="Ej: 2317456789">
    </div>
    <div class="form-group">
      <label class="form-label">Notas</label>
      <textarea class="form-input" id="pr_notes" rows="3">${p?.notes || ''}</textarea>
    </div>
    <button class="btn" onclick="saveProvider('${id||''}')">${isNew ? 'Crear' : 'Guardar'}</button>
    ${!isNew ? `<button class="btn btn-danger" style="margin-top:10px;" onclick="deleteProvider('${id}')">🗑️ Eliminar</button>` : ''}
  `);
}

function saveProvider(id) {
  const name = document.getElementById('pr_name').value.trim();
  if (!name) { showToast('Falta nombre', 'error'); return; }
  const data = {
    name,
    phone: document.getElementById('pr_phone').value.trim(),
    notes: document.getElementById('pr_notes').value.trim()
  };
  if (id) Object.assign(state.providers.find(p => p.id === id), data);
  else state.providers.push({ id: uid(), ...data });
  saveState();
  showToast(id ? 'Actualizado' : 'Creado');
  openProveedores();
}

function deleteProvider(id) {
  if (!confirm('¿Eliminar proveedor?')) return;
  state.providers = state.providers.filter(p => p.id !== id);
  saveState();
  openProveedores();
}

// ============ LISTA DE PEDIDO ============
function openListaPedido() {
  const lowStock = state.products.filter(p => getTotalStock(p) <= (p.lowStockThreshold || state.settings.lowStockDefault));
  openModal(`
    <div class="modal-header">
      <div class="modal-title">📋 Lista de pedido</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="color:#cbd5e1; font-size:13px; margin-bottom:14px;">Productos con stock bajo. Marcá los que querés pedir y compartilo.</div>
    ${lowStock.length ? `
      <div id="lista-items">
        ${lowStock.map(p => `
          <label style="display:flex; align-items:center; gap:12px; padding:12px; background:#0f172a; border:1px solid #334155; border-radius:10px; margin-bottom:8px; cursor:pointer;">
            <input type="checkbox" class="lista-check" data-name="${p.name}" data-stock="${getTotalStock(p)}" checked style="width:20px; height:20px;">
            <div style="flex:1;">
              <div style="font-weight:600;">${p.name}</div>
              <div style="font-size:12px; color:#94a3b8;">Stock actual: ${getTotalStock(p)} u. ${p.category?'· '+p.category:''}</div>
            </div>
          </label>
        `).join('')}
      </div>
      <button class="btn" style="margin-top:14px;" onclick="compartirLista()">📤 Compartir por WhatsApp</button>
    ` : `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">No hay productos con stock bajo</div></div>`}
  `);
}

function compartirLista() {
  const checks = document.querySelectorAll('.lista-check:checked');
  if (!checks.length) { showToast('Seleccioná al menos un producto', 'error'); return; }
  let text = '*Pedido Maxikiosco City*\\n' + new Date().toLocaleDateString('es-AR') + '\\n\\n';
  checks.forEach(c => { text += `• ${c.dataset.name} (actual: ${c.dataset.stock})\\n`; });
  const url = `https://wa.me/?text=${encodeURIComponent(text)}`;
  window.open(url, '_blank');
}

// ============ SETTINGS ============
function openSettings() {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">⚙️ Ajustes</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label">Avisar "por vencer" desde (días antes)</label>
      <input type="number" class="form-input" id="s_warn" value="${state.settings.warnDaysBefore}">
    </div>
    <div class="form-group">
      <label class="form-label">Avisar "crítico" desde (días antes)</label>
      <input type="number" class="form-input" id="s_danger" value="${state.settings.dangerDaysBefore}">
    </div>
    <div class="form-group">
      <label class="form-label">Stock bajo por defecto (unidades)</label>
      <input type="number" class="form-input" id="s_lowstock" value="${state.settings.lowStockDefault}">
    </div>
    <button class="btn" onclick="saveSettings()">Guardar</button>
    <button class="btn btn-secondary" style="margin-top:10px;" onclick="requestNotifications()">🔔 Activar notificaciones</button>
  `);
}

function saveSettings() {
  state.settings.warnDaysBefore = parseInt(document.getElementById('s_warn').value) || 30;
  state.settings.dangerDaysBefore = parseInt(document.getElementById('s_danger').value) || 7;
  state.settings.lowStockDefault = parseInt(document.getElementById('s_lowstock').value) || 5;
  saveState();
  closeModal();
  showToast('Ajustes guardados');
  render();
}

function requestNotifications() {
  if (!('Notification' in window)) { showToast('Tu navegador no soporta notificaciones', 'error'); return; }
  Notification.requestPermission().then(p => {
    if (p === 'granted') showToast('Notificaciones activadas');
    else showToast('Notificaciones bloqueadas', 'error');
  });
}

function scheduleNotification(event) {
  // Simple in-session reminder; for true background notifications, a service worker would be needed
  if (Notification.permission !== 'granted') return;
}

// ============ BACKUP ============
function openBackup() {
  openModal(`
    <div class="modal-header">
      <div class="modal-title">💾 Exportar / Importar</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div style="color:#cbd5e1; font-size:13px; margin-bottom:14px;">Guardá una copia de tus datos o restaurá desde un backup.</div>
    <button class="btn" onclick="exportData()">📥 Exportar todo (JSON)</button>
    <button class="btn btn-secondary" style="margin-top:10px;" onclick="document.getElementById('importFile').click()">📤 Importar backup</button>
    <input type="file" id="importFile" accept=".json" style="display:none;" onchange="importData(event)">
    <button class="btn btn-danger" style="margin-top:20px;" onclick="resetData()">🗑️ Borrar todos los datos</button>
  `);
}

function exportData() {
  const data = JSON.stringify(state, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `maxikiosco-backup-${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  URL.revokeObjectURL(url);
  showToast('Backup descargado');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!confirm('¿Reemplazar todos los datos actuales por el backup?')) return;
      state = { ...state, ...imported };
      saveState();
      closeModal();
      showToast('Datos importados');
      render();
    } catch(err) {
      showToast('Archivo inválido', 'error');
    }
  };
  reader.readAsText(file);
}

function resetData() {
  if (!confirm('¿Borrar TODOS los datos? Esta acción no se puede deshacer.')) return;
  if (!confirm('¿Estás completamente seguro?')) return;
  localStorage.removeItem(STORAGE_KEY);
  state = { products: [], events: [], providers: [], settings: state.settings };
  saveState();
  closeModal();
  showToast('Datos borrados');
  render();
}

// ============ NAV ============
document.querySelectorAll('.nav-item').forEach(n => {
  n.onclick = () => { currentView = n.dataset.view; render(); };
});

// ============ INIT ============
loadState();
render();
</script>
